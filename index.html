<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { background: #1b2838; color: #c7d5e0; font-family: sans-serif; text-align: center; padding: 20px; }
        .card { background: #171a21; border: 1px solid #66c0f4; border-radius: 10px; padding: 20px; }
        input { width: 90%; padding: 10px; margin: 10px 0; background: #101822; color: #fff; border: 1px solid #4e829e; border-radius: 5px; }
        button { width: 95%; padding: 12px; background: #66c0f4; border: none; color: white; font-weight: bold; cursor: pointer; border-radius: 5px; }
        .stats-box { display: none; margin-top: 20px; text-align: left; }
        .stat-item { display: flex; justify-content: space-between; padding: 8px 0; border-bottom: 1px solid #2a475e; }
    </style>
</head>
<body>
    <div class="card">
        <h2>CS2 PRO-TRACKER</h2>
        <div id="input-area">
            <input type="text" id="steamid" placeholder="Вставь SteamID64">
            <button onclick="getStats()">ЗАГРУЗИТЬ</button>
        </div>

        <div id="loading" style="display:none; color:#5c7e10;">Загрузка данных...</div>

        <div id="stats-area" class="stats-box">
            <div class="stat-item"><span>Убийства:</span> <b id="kills">0</b></div>
            <div class="stat-item"><span>K/D:</span> <b id="kd">0</b></div>
            <div class="stat-item"><span>Победы:</span> <b id="wins">0</b></div>
            <div class="stat-item"><span>Headshots:</span> <b id="hs">0</b></div>
            <button onclick="location.reload()" style="margin-top:15px; background:#4e829e;">НАЗАД</button>
        </div>
    </div>

    <script>
        let tg = window.Telegram.WebApp;
        tg.expand();

        async function getStats() {
            const id = document.getElementById('steamid').value;
            if(!id) return tg.showAlert("ID пустой!");

            document.getElementById('input-area').style.display = 'none';
            document.getElementById('loading').style.display = 'block';

            try {
                // ВАЖНО: Вместо 'ТВОЙ_АДРЕС' вставь ссылку из ngrok (например, https://abcd-123.ngrok-free.app)
                const response = await fetch(`https://ТВОЙ_АДРЕС_NGROK/api/stats/${id}`);
                const data = await response.json();

                if(data.status === 'ok') {
                    document.getElementById('loading').style.display = 'none';
                    document.getElementById('stats-area').style.display = 'block';
                    document.getElementById('kills').innerText = data.kills;
                    document.getElementById('kd').innerText = data.kd;
                    document.getElementById('wins').innerText = data.wins;
                    document.getElementById('hs').innerText = data.hs + "%";
                } else {
                    throw new Error();
                }
            } catch (e) {
                tg.showAlert("Сервер бота не ответил. Проверь ngrok!");
                location.reload();
            }
        }
    </script>
</body>
</html>
