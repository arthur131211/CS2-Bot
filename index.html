<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { background: #1b2838; color: #c7d5e0; font-family: 'Segoe UI', sans-serif; padding: 15px; margin: 0; }
        .card { background: #171a21; border: 1px solid #66c0f4; border-radius: 10px; padding: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.5); }
        h2 { color: #66c0f4; margin: 0 0 15px 0; font-size: 20px; }
        .stat-row { display: flex; justify-content: space-between; padding: 10px 0; border-bottom: 1px solid #2a475e; }
        .stat-label { color: #8b929a; }
        .stat-value { color: #fff; font-weight: bold; }
        input { 
            width: 100%; padding: 12px; margin: 15px 0; 
            background: #101822; color: white; 
            border: 1px solid #2a475e; border-radius: 5px; 
            box-sizing: border-box; 
        }
        button { 
            width: 100%; padding: 15px; 
            background: #66c0f4; border: none; color: white; 
            font-weight: bold; border-radius: 5px; cursor: pointer;
        }
        #stats_screen { display: none; } /* Скрыт по умолчанию */
    </style>
</head>
<body>

    <div id="input_screen" class="card">
        <h2>CS2 ТРЕКЕР</h2>
        <input type="text" id="steam_id" placeholder="Введите SteamID64 (7656...)">
        <button onclick="requestStats()">ПОЛУЧИТЬ СТАТИСТИКУ</button>
    </div>

    <div id="stats_screen" class="card">
        <h2 id="user_name">СТАТИСТИКА ИГРОКА</h2>
        <div class="stat-row"><span class="stat-label">Убийства:</span> <span class="stat-value" id="val_kills">-</span></div>
        <div class="stat-row"><span class="stat-label">K/D Ratio:</span> <span class="stat-value" id="val_kd">-</span></div>
        <div class="stat-row"><span class="stat-label">Победы:</span> <span class="stat-value" id="val_wins">-</span></div>
        <div class="stat-row"><span class="stat-label">Headshots:</span> <span class="stat-value" id="val_hs">-</span></div>
        <button style="margin-top:20px; background:#4e829e;" onclick="location.reload()">НАЗАД</button>
    </div>

    <script>
        let tg = window.Telegram.WebApp;
        tg.expand();

        function requestStats() {
            let id = document.getElementById('steam_id').value;
            if (id.length < 10) {
                tg.showAlert("Введите корректный SteamID64");
                return;
            }
            // Отправляем ID боту, чтобы он собрал данные
            tg.sendData("GET_STATS:" + id);
            // Мы НЕ закрываем окно (tg.close() убрали), 
            // но нам нужно дождаться ответа от бота.
        }
    </script>
</body>
</html>
