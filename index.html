<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { background: #1b2838; color: #c7d5e0; font-family: sans-serif; text-align: center; padding: 20px; }
        input { width: 90%; padding: 12px; margin: 10px 0; background: #101822; border: 1px solid #66c0f4; color: white; border-radius: 4px; }
        button { width: 95%; padding: 12px; background: #66c0f4; border: none; color: white; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>
    <h2>Steam CS2 Stats</h2>
    <p>Вставь ссылку на профиль или SteamID:</p>
    <input type="text" id="steam_id" placeholder="https://steamcommunity.com/id/...">
    <button onclick="sendData()">Показать статистику</button>

    <script>
        let tg = window.Telegram.WebApp;
        tg.expand();
        function sendData() {
            let val = document.getElementById('steam_id').value;
            if(val) {
                tg.sendData("STEAM:" + val);
                tg.close();
            }
        }
    </script>
</body>
</html>
