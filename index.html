<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body {
            background: #121417;
            color: white;
            font-family: 'Segoe UI', sans-serif;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .header {
            color: #ff9d00;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 20px;
        }
        .card-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            width: 100%;
        }
        .map-card {
            background: #1e2126;
            border: 1px solid #333;
            border-radius: 12px;
            padding: 10px;
            text-align: center;
            transition: 0.3s;
        }
        .map-card:active {
            transform: scale(0.95);
            border-color: #ff9d00;
        }
        .map-card img {
            width: 100%;
            border-radius: 8px;
        }
        .btn-main {
            margin-top: 30px;
            background: #ff9d00;
            color: black;
            border: none;
            padding: 15px 30px;
            border-radius: 10px;
            font-weight: bold;
            width: 100%;
        }
    </style>
</head>
<body>
    <h2 class="header">CS2 Assistant</h2>
    
    <div class="card-grid">
        <div class="map-card" onclick="selectMap('Mirage')">
            <p>Mirage</p>
        </div>
        <div class="map-card" onclick="selectMap('Dust 2')">
            <p>Dust 2</p>
        </div>
        <div class="map-card" onclick="selectMap('Inferno')">
            <p>Inferno</p>
        </div>
        <div class="map-card" onclick="selectMap('Overpass')">
            <p>Overpass</p>
        </div>
    </div>

    <button class="btn-main" onclick="tgClose()">Закрыть приложение</button>

    <script>
        let tg = window.Telegram.WebApp;
        tg.expand();

        function selectMap(name) {
            // Отправляем боту название выбранной карты
            tg.sendData("Выбрана карта: " + name);
        }

        function tgClose() {
            tg.close();
        }
    </script>
</body>
</html>
